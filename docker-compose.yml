services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wacrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wacrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  soketi:
    image: quay.io/soketi/soketi:1.4-16-debian
    environment:
      DEFAULT_APP_ID: wacrm
      DEFAULT_APP_KEY: local-soketi-key
      DEFAULT_APP_SECRET: local-soketi-secret
      SOKETI_DEBUG: "1"
      SOKETI_METRICS_SERVER_PORT: "9601"
    ports:
      - "6001:6001"
      - "9601:9601"

  alarik:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: local-access-key
      MINIO_ROOT_PASSWORD: local-secret-key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - alarik-data:/data

  alarik-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - alarik
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://alarik:9000 local-access-key local-secret-key &&
      mc mb --ignore-existing local/wacrm-media &&
      mc anonymous set download local/wacrm-media
      "

volumes:
  postgres-data:
  alarik-data:
